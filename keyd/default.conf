# keyd config for this i3 setup — single source of truth for keyboard remapping.
# Installed to /etc/keyd/default.conf  (see scripts/keyd-install).
# keyd runs at the evdev level, BELOW X, so this replaces the setxkbmap options
# that used to live in scripts/keyboard-apply (altwin:swap_alt_win + ctrl:nocaps).
#
# After editing: re-run `scripts/keyd-install` (or `sudo cp` + `sudo keyd reload`).
# Validate first with:  keyd check keyd/default.conf

[ids]
*

[global]
# Window in which keys must be struck together to register as a chord.
# Lower = less interference with fast typing, but harder to hit the chord.
chord_timeout = 35

[main]

# --- Swap Alt and Win (replaces setxkbmap altwin:swap_alt_win) --------------
# Physical Alt  -> Super/Mod4  (this is i3 $mod)
# Physical Win  -> Alt
leftalt   = layer(meta)
leftmeta  = layer(alt)
rightmeta = layer(alt)

# --- Right "mod" (physical right Alt) = arrow-key navigation layer -----------
rightalt = layer(nav)

# --- Workspace chords: home-row pairs -> Mod4+N (i3 maps Mod4+N to workspace)
# Order-independent. NOTE: s+l overlaps common bigrams (also/else/false/slow/
# sleep) and may misfire while typing fast — tune chord_timeout above if so.
f+j         = macro(M-1)
d+k         = macro(M-2)
s+l         = macro(M-3)
a+semicolon = macro(M-4)

# --- Arrow-key nav layer ----------------------------------------------------
# Hold right mod, then j/k/l/;  (matches your i3 focus directions).
# Plain layer = bare arrows. Shift passes through, so right-mod+Shift+j selects.
[nav]
j         = left
k         = down
l         = up
semicolon = right
