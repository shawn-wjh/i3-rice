# terminal
bindsym $mod+Return exec env GTK_THEME=Breeze-Dark QT_QPA_PLATFORMTHEME=qt6ct XDG_CURRENT_DESKTOP=KDE ~/.config/i3/scripts/alacritty-display-font

# kill focused window
bindsym $mod+q kill

# app launcher
bindsym $mod+space exec --no-startup-id env GTK_THEME=Breeze-Dark QT_QPA_PLATFORMTHEME=qt6ct XDG_CURRENT_DESKTOP=KDE rofi -show drun
bindsym $mod+c exec --no-startup-id ~/.config/i3/scripts/clipcat-menu
bindsym $mod+Shift+s exec --no-startup-id ~/.config/i3/scripts/screenshot

# change focus
bindsym $mod+j focus left
bindsym $mod+k focus down
bindsym $mod+l focus up
bindsym $mod+semicolon focus right
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

# move focused window
bindsym $mod+Shift+j move left
bindsym $mod+Shift+l move up
bindsym $mod+Shift+semicolon move right
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

# layout
bindsym $mod+f fullscreen toggle
bindsym $mod+s layout stacking
bindsym $mod+t layout tabbed
bindsym $mod+e layout toggle split
bindsym $mod+Shift+v floating toggle
bindsym $mod+v focus mode_toggle
bindsym $mod+a focus parent

# i3 management
bindsym $mod+Shift+c reload
bindsym $mod+Shift+r restart
bindsym $mod+Shift+e exec "i3-nagbar -t warning -m 'You pressed the exit shortcut. Do you really want to exit i3? This will end your X session.' -B 'Yes, exit i3' 'i3-msg exit'"

# audio
bindsym $mod+o exec --no-startup-id ~/.config/i3/scripts/sink-switch.sh

# qnote
bindsym $mod+n exec --no-startup-id ~/.config/i3/scripts/qnote-menu

# todo list
bindsym $mod+d exec --no-startup-id ~/.config/i3/scripts/todui

# settings
bindsym $mod+comma exec --no-startup-id ~/.config/i3/scripts/settings.sh
bindsym $mod+Ctrl+space exec --no-startup-id ~/.config/i3/scripts/theme-bg-next

# vscode workspaces
bindsym $mod+p exec --no-startup-id ~/.config/i3/scripts/vsc-workspaces.sh
bindsym $mod+i exec --no-startup-id env LOCAL_TUI_TITLE="Install Package" ~/.config/i3/scripts/launch-tui ~/.config/i3/scripts/pkg-install
bindsym $mod+Shift+i exec --no-startup-id env LOCAL_TUI_TITLE="Remove Package" ~/.config/i3/scripts/launch-tui ~/.config/i3/scripts/pkg-remove

# bluetooth
bindsym $mod+Shift+b exec --no-startup-id ~/.config/i3/scripts/bluetooth.sh
bindsym $mod+Shift+w exec --no-startup-id ~/.config/i3/scripts/wifi.sh

# display / power
bindsym $mod+b exec ~/.config/i3/scripts/power-profile-rotate.sh

# scratchpad
bindsym $mod+Shift+minus exec --no-startup-id ~/.config/i3/scripts/scratchpad-slots menu
bindsym $mod+F1 exec --no-startup-id ~/.config/i3/scripts/scratchpad-slots slot 1
bindsym $mod+F2 exec --no-startup-id ~/.config/i3/scripts/scratchpad-slots slot 2
bindsym $mod+F3 exec --no-startup-id ~/.config/i3/scripts/scratchpad-slots slot 3
bindsym $mod+F4 exec --no-startup-id ~/.config/i3/scripts/scratchpad-slots slot 4
bindsym $mod+F5 exec --no-startup-id ~/.config/i3/scripts/scratchpad-slots slot 5
bindsym $mod+F6 exec --no-startup-id ~/.config/i3/scripts/scratchpad-slots slot 6
bindsym $mod+F7 exec --no-startup-id ~/.config/i3/scripts/scratchpad-slots slot 7
bindsym $mod+F8 exec --no-startup-id ~/.config/i3/scripts/scratchpad-slots slot 8
bindsym $mod+F9 exec --no-startup-id ~/.config/i3/scripts/scratchpad-slots slot 9
bindsym $mod+F10 exec --no-startup-id ~/.config/i3/scripts/scratchpad-slots slot 10
bindsym $mod+F11 exec --no-startup-id ~/.config/i3/scripts/scratchpad-slots slot 11
bindsym $mod+F12 exec --no-startup-id ~/.config/i3/scripts/scratchpad-slots slot 12
bindsym $mod+F13 exec --no-startup-id ~/.config/i3/scripts/scratchpad-slots slot 13
