# volume
bindsym XF86AudioRaiseVolume       exec --no-startup-id ~/.config/i3/scripts/volume-notify.sh up && $refresh_i3status
bindsym XF86AudioLowerVolume       exec --no-startup-id ~/.config/i3/scripts/volume-notify.sh down && $refresh_i3status
bindsym XF86AudioMute              exec --no-startup-id ~/.config/i3/scripts/volume-notify.sh mute && $refresh_i3status
bindsym Shift+XF86AudioRaiseVolume exec --no-startup-id ~/.config/i3/scripts/volume-notify.sh up 1 && $refresh_i3status
bindsym Shift+XF86AudioLowerVolume exec --no-startup-id ~/.config/i3/scripts/volume-notify.sh down 1 && $refresh_i3status

# media player
bindsym $mod+XF86AudioRaiseVolume exec --no-startup-id playerctl next
bindsym $mod+XF86AudioLowerVolume exec --no-startup-id playerctl previous
bindsym $mod+XF86AudioMute        exec --no-startup-id playerctl play-pause

# brightness
bindsym XF86MonBrightnessUp         exec --no-startup-id ~/.config/i3/scripts/brightness-notify.sh up
bindsym XF86MonBrightnessDown       exec --no-startup-id ~/.config/i3/scripts/brightness-notify.sh down
bindsym Shift+XF86MonBrightnessUp   exec --no-startup-id ~/.config/i3/scripts/brightness-notify.sh up 1
bindsym Shift+XF86MonBrightnessDown exec --no-startup-id ~/.config/i3/scripts/brightness-notify.sh down 1
